<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hostel Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Hostel Expense Tracker</h1>
    <p class="subtitle">Track your hostel expenses easily</p>

    <div class="summary">
      <div class="card">
        <h3>Total Budget</h3>
        <p id="budgetDisplay">₹0</p>
      </div>
      <div class="card">
        <h3>Total Spent</h3>
        <p id="totalSpent">₹0</p>
      </div>
      <div class="card">
        <h3>Remaining</h3>
        <p id="remainingBudget">₹0</p>
      </div>
    </div>

    <div class="form-section">
      <h2>Set Monthly Budget</h2>
      <div class="form-group">
        <input type="number" id="budgetInput" placeholder="Enter monthly budget" />
        <button onclick="setBudget()">Set Budget</button>
      </div>
    </div>

    <div class="form-section">
      <h2>Add Expense</h2>
      <div class="form-grid">
        <input type="text" id="expenseName" placeholder="Expense name" />
        <input type="number" id="expenseAmount" placeholder="Amount" />
        <select id="expenseCategory">
          <option value="">Select Category</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Study">Study</option>
          <option value="Recharge">Recharge</option>
          <option value="Personal">Personal</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="expenseDate" />
      </div>
      <button class="add-btn" onclick="addExpense()">Add Expense</button>
    </div>

    <div class="expense-list-section">
      <h2>Expense History</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="expenseList"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
